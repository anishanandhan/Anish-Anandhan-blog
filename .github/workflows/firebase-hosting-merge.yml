# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
permissions:
  contents: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ANISH_ANANDHAN_BLOG }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT secret is empty!"
            exit 1
          fi
          echo "Secret length: ${#FIREBASE_SERVICE_ACCOUNT}"
          echo "Secret prefix: $(echo -n "$FIREBASE_SERVICE_ACCOUNT" | head -c 15)..."
          echo "Secret suffix: ...$(echo -n "$FIREBASE_SERVICE_ACCOUNT" | tail -c 15)"
          echo "$FIREBASE_SERVICE_ACCOUNT" | jq . > /dev/null && echo "Secret is valid JSON." || echo "::error::Secret is NOT valid JSON!"
          echo "$FIREBASE_SERVICE_ACCOUNT" > service-account.json
          export GOOGLE_APPLICATION_CREDENTIALS=service-account.json
          
          # Run deployment and capture logs
          npx firebase deploy --only hosting --project anish-anandhan-blog > deploy-log.txt 2>&1
          status=$?
          
          # Clean up service account
          rm -f service-account.json
          
          exit $status

      - name: Upload Deployment Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firebase-deploy-logs
          path: deploy-log.txt

